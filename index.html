    <script>
        // Enhanced fix for "Cannot set property fetch of #<Window> which has only a getter"
        (function() {
            function safeFixFetch(obj) {
                try {
                    if (!obj || !obj.fetch) return;
                    var descriptor = Object.getOwnPropertyDescriptor(obj, 'fetch') || 
                                     Object.getOwnPropertyDescriptor(Object.getPrototypeOf(obj), 'fetch');
                    
                    if (descriptor && descriptor.configurable) {
                        var currentFetch = obj.fetch;
                        Object.defineProperty(obj, 'fetch', {
                            get: function() { return currentFetch; },
                            set: function(v) { currentFetch = v; },
                            configurable: true,
                            enumerable: true
                        });
                    }
                } catch (e) {
                    console.warn('Fetch fix failed:', e);
                }
            }

            safeFixFetch(window);
            if (typeof globalThis !== 'undefined') safeFixFetch(globalThis);

            // Global safety for JSON.parse("undefined") error
            var originalJSONParse = JSON.parse;
            JSON.parse = function(text, reviver) {
                if (text === 'undefined') {
                    return undefined;
                }
                return originalJSONParse.call(JSON, text, reviver);
            };
        })();
    </script>

        body {

            color: var(--text-color);

        @media print {

        ::-webkit-scrollbar-thumb {

        }
        ::-webkit-scrollbar-thumb:hover {

        .theme-transition {
            transition: all 0.5s ease;
        }

        /* Typography overrides for better readability */

            font-weight: 400;
            opacity: 0.85;
        }

        .headline-text {
            font-weight: 700;
            letter-spacing: -0.02em;
        }
